<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Telegram Gallery Pro</title>
<link rel="stylesheet" href="/static/styles.css">
<style>
body { background: #0f172a; color: white; font-family: Arial,sans-serif; margin:0; }
.header { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#020617; border-bottom:1px solid #1e293b; }
.header h1 { margin:0; font-size:20px; }
.header a { color:#38bdf8; text-decoration:none; margin-left:15px; }
.upload-box { text-align:center; padding:20px; }
.upload-box input { margin-bottom:10px; }
.upload-box button { background:#38bdf8; border:none; padding:10px 20px; color:black; border-radius:8px; cursor:pointer; }
.gallery { display:grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap:10px; padding:10px; }
.card { position:relative; overflow:hidden; border-radius:12px; cursor:pointer; }
.card img { width:100%; display:block; transition: transform 0.3s; }
.card:hover img { transform: scale(1.05); }
.viewer { position:fixed; display:none; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; }
.viewer img { max-width:90%; max-height:90%; }
.skeleton { background:#1e293b; border-radius:12px; width:100%; padding-bottom:100%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% {opacity:1} 50% {opacity:0.4} 100% {opacity:1} }
</style>
</head>
<body>
<div class="header">
  <h1>🖼 Telegram Gallery Pro</h1>
  <a href="/logout">Выйти</a>
</div>

<div class="upload-box">
  <form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file">
    <button>Загрузить</button>
  </form>
</div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer" onclick="closeViewer()">
  <img id="full">
</div>

<script>
let allImages = [];
let offset = 0;
const limit = 10; // подгружаем по 10 фото за раз
let loading = false;

async function fetchImages() {
    if (loading) return;
    loading = true;
    // Показываем skeletons
    const gallery = document.getElementById("gallery");
    for(let i=0;i<limit;i++){
        const skel = document.createElement("div");
        skel.className="skeleton";
        gallery.appendChild(skel);
    }

    const res = await fetch("/images");
    const data = await res.json();
    allImages = data;

    // Удаляем skeletons
    document.querySelectorAll(".skeleton").forEach(s=>s.remove());

    loadNextBatch();
    loading = false;
}

function loadNextBatch() {
    const gallery = document.getElementById("gallery");
    const batch = allImages.slice(offset, offset+limit);
    batch.forEach(name=>{
        const card = document.createElement("div");
        card.className="card";
        const img = document.createElement("img");
        img.dataset.name=name;
        img.loading="lazy"; // браузерная lazy загрузка
        img.src=`/image?name=${name}`;
        img.onclick=()=>openViewer(img.src);
        card.appendChild(img);
        gallery.appendChild(card);
    });
    offset += limit;
}

// infinite scroll
window.addEventListener("scroll", ()=>{
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 300){
        loadNextBatch();
    }
});

function openViewer(src){
    document.getElementById("viewer").style.display="flex";
    document.getElementById("full").src=src;
}
function closeViewer(){ document.getElementById("viewer").style.display="none"; }

fetchImages();
</script>
</body>
</html>
